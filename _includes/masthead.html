<div class="masthead">
  <div class="masthead__inner-wrap">
    <nav id="site-nav" class="greedy-nav">
      <a href="/" target="_self" class="masthead__brand">
        <span class="masthead__brand-name">SHEN Jiaxing</span>
        <span class="masthead__brand-role">Human-centered AI · Lingnan University</span>
      </a>
      <button><div class="navicon"></div></button>
      <ul class="visible-links">
        {% for link in site.data.navigation.main %}
          <li class="masthead__menu-item"><a href="{{ domain }}{{ link.url }}" target="_self" class="change-content">{{ link.title }}</a></li>
        {% endfor %}
      </ul>
      <div class="masthead__employer">
        <img src="images/employer.png" alt="Lingnan University">
      </div>
      <ul class="hidden-links hidden"></ul>
    </nav>
  </div>
</div>
